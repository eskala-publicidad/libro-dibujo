<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melfi Colorea</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-block">
        <img src="SVG/titulo.svg" alt="Título Melfi Colorea" class="title-art">
        <p>Explora páginas distintas, elige lápices y borra con precisión como en un libro real.</p>
      </div>
    </header>

    <main class="main-grid">
      <aside class="toolbar">
        <section class="panel">
          <h2>Herramienta</h2>
          <div class="tool-buttons">
            <button type="button" class="tool-button active" data-tool="brush" data-size="4">Lápiz fino</button>
            <button type="button" class="tool-button" data-tool="brush" data-size="10">Lápiz medio</button>
            <button type="button" class="tool-button" data-tool="brush" data-size="20">Lápiz grueso</button>
            <button type="button" class="tool-button" data-tool="eraser">Borrador</button>
          </div>
          <p class="tool-note">Elige lápiz para colorear o borrador para limpiar con precisión.</p>
        </section>

        <section class="panel">
          <h2>Colores</h2>
          <div id="palette" class="color-palette"></div>
          <label class="custom-color">
            <span>Color personalizado</span>
            <input type="color" id="customColor" value="#ff6b81">
          </label>
        </section>

        <section class="panel">
          <h2>Grosor del trazo</h2>
          <label for="brushSize">Tamaño: <span id="brushSizeValue">8</span> px</label>
          <input type="range" id="brushSize" min="2" max="50" value="8">
        </section>

        <section class="panel">
          <h2>Páginas del libro</h2>
          <div id="templateGallery" class="template-gallery"></div>
        </section>

        <section class="panel actions">
          <button id="clearBtn" class="button secondary">Borrar todo</button>
          <button id="downloadBtn" class="button primary">Descargar</button>
        </section>
      </aside>

      <section class="canvas-panel">
        <div class="canvas-frame">
          <div class="page-edge"></div>
          <canvas id="paintCanvas" width="1280" height="960"></canvas>
          <canvas id="overlayCanvas" width="1280" height="960" aria-hidden="true"></canvas>
          <div class="canvas-hint">Toca o arrastra para pintar bajo las líneas.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
